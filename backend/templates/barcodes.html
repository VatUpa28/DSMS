{% extends "base.html" %}
{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Barcode Gallery</h3>

        <div>
            <button id="selectAllBtn" class="btn btn-sm btn-primary">
                Select All
            </button>

            <button id="clearAllBtn" class="btn btn-sm btn-secondary">
                Unselect All
            </button>

            <button id="generatePdfBtn" class="btn btn-sm btn-success">
                Generate PDF
            </button>
        </div>
    </div>

    <table class="table table-bordered table-hover align-middle">
        <thead>
            <tr>
                <th width="50"></th>
                <th>Stock #</th>
                <th>Barcode</th>
                <th width="150">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for s in stones %}
            <tr>

                <td>
                    <input type="checkbox"
                           class="barcode-checkbox"
                           value="{{ s.id }}">
                </td>

                <td>
                    <strong>{{ s.stock_number }}</strong>
                </td>

                <td>
                    <img src="{{ url_for('static', filename=s.barcode_path) }}"
                         style="height:60px;">
                </td>

                <td>
                    <a class="btn btn-sm btn-outline-primary"
                       href="{{ url_for('barcode.barcodes', stone_id=s.id) }}">
                        Open
                    </a>
                </td>

            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
